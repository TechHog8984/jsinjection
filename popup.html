<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        width: 400px;
      }

      .hidden {
        display: none;
      }

      button {
        border: none;
        width: 100%;
        margin: 3% auto;
        padding: 4px;
        text-align: center;
        font-size: 1.5em;
        cursor: pointer;
      }

      input {
        width: 96%;
      }

      #list-container {
        margin-top: 10px;
      }

      li {
        margin-bottom: 5px;
        font-size: 0.9em;
      }

      .remove-button {
        margin-left: 5px;
        color: red;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="popup-content">
      <p>URL REGEX:</p><input id="url_pattern"></input>
      <p>SCRIPT URL:</p><input id="script_url"</input>
      <button id="add_button">add</button>

      <div id="list-container">
        <p>Script List:</p>
        <ul id="scripts-list"></ul>
      </div>
    </div>
    <div id="error-content" class="hidden">
      <p>error</p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
